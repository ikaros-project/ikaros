name: Portable matrix

on:
  push:
    paths:
      - CMakeLists.txt
      - Source/Kernel/matrix.cc
      - Source/Kernel/matrix.h
      - Source/Kernel/UnitTesting/KernelTests/**
      - Source/Kernel/UnitTesting/TestModules/MatrixFunctionTestModule/**
      - Source/Kernel/UnitTesting/UtilityTests/test_matrix.cc
      - Source/Modules/IOModules/FileInput/InputFile/InputFile.cc
      - .github/workflows/matrix-portable.yml
  pull_request:
    paths:
      - CMakeLists.txt
      - Source/Kernel/matrix.cc
      - Source/Kernel/matrix.h
      - Source/Kernel/UnitTesting/KernelTests/**
      - Source/Kernel/UnitTesting/TestModules/MatrixFunctionTestModule/**
      - Source/Kernel/UnitTesting/UtilityTests/test_matrix.cc
      - Source/Modules/IOModules/FileInput/InputFile/InputFile.cc
      - .github/workflows/matrix-portable.yml

jobs:
  matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: release
            build_type: Release
            sanitizer_flags: ""
            run_benchmark: true
          - name: asan-ubsan
            build_type: Debug
            sanitizer_flags: -fsanitize=address,undefined -fno-omit-frame-pointer
            run_benchmark: false
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            liblapack-dev \
            libopenblas-dev \
            libpng-dev \
            libturbojpeg0-dev

      - name: Configure portable matrix build
        run: |
          cmake -S . -B BuildPortable \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DIKAROS_MATRIX_ACCELERATE=OFF \
            -DCMAKE_CXX_FLAGS="${{ matrix.sanitizer_flags }}" \
            -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.sanitizer_flags }}"

      - name: Build
        run: cmake --build BuildPortable --parallel 2

      - name: Run matrix kernel tests
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          matrix_tests="$RUNNER_TEMP/matrix-tests"
          mkdir -p "$matrix_tests"
          cp Source/Kernel/UnitTesting/KernelTests/test_7[0-7]_*.ikg "$matrix_tests"
          cp Source/Kernel/UnitTesting/KernelTests/test_79_matrix_hotspots.ikg "$matrix_tests"
          cp Source/Kernel/UnitTesting/KernelTests/test_223_input_file_growth.ikg "$matrix_tests"
          python3 Source/Kernel/UnitTesting/KernelTests/kernel_test.py \
            "$matrix_tests" "Portable Matrix Tests"

      - name: Compile standalone matrix utility test
        env:
          SANITIZER_FLAGS: ${{ matrix.sanitizer_flags }}
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          c++ -std=c++17 -O2 $SANITIZER_FLAGS \
            -DIKAROS_MATRIX_ACCELERATE=0 \
            -DIKAROS_MATRIX_CHECKS=1 \
            -I Source \
            Source/Kernel/UnitTesting/UtilityTests/test_matrix.cc \
            -llapack -lblas \
            -o "$RUNNER_TEMP/test-matrix"
          "$RUNNER_TEMP/test-matrix"

      - name: Run Release benchmark smoke test
        if: matrix.run_benchmark
        run: ./Bin/ikaros -b Source/Kernel/UnitTesting/KernelTests/benchmark_matrix_hotspots.ikg
